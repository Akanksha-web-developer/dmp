<html>

<head>
    <title>Web page designing</title>
    <style>
        body {
            margin: 0;
            background-image: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            text-align: center;
            padding: 20px;

        }

        p {
            float: left;
            font-family: perpetua;
            font-size: 35px;
            font-weight: bold;
        }

        .con {
            display: block;
            margin: auto;
            width: 70%;
            padding: 25px;
            color: black;
            background-color: transparent;
            text-align: justify;
        }

        .main {
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        video {
            height: 500px;
            width: 400px;
            margin: 20px;
        }

        h1 {
            font-size: 35px;
        }
    </style>
</head>

<body>
    <center>
        <h1>Web Page Designing</h1>
    </center>
    <div class="main">
        <div class="con">
            <p>
                Web designing interests me as it allows me
                to design creative and engaging web pages while
                improving both my technical and creative abilities.
                <br>Till now, I have created many web pages using html and basic CSS styles.
            </p>
        </div>

        <video autoplay Video/mp4>
            <source src="wv.mp4">
        </video>
    </div>
</body>

</html>
